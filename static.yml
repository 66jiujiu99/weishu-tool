name: weishu-tool
description: "一个基于纯静态HTML的明日方舟卫戍协议干员和盟约信息展示网页"

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:              # 这里建议缩进两个空格
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 
      - uses: actions/deploy-pages@v4