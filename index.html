<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日方舟-卫戍协议</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 50%, #a8c0ff 100%);
            color: #333333;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        /* 左侧面板 */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* 盟约信息区域 */
        .covenant-info {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            min-height: 300px;
            max-height: 40vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .covenant-info h2 {
            color: #4a9eff;
            margin-bottom: 15px;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .covenant-details {
            line-height: 1.6;
        }

        .covenant-details .requirement {
            color: #ff6b35;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .covenant-details .description {
            white-space: pre-line;
            color: #555555;
        }

        /* 干员列表区域 */
        .operators-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            flex: 1;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .operators-section h3 {
            color: #4a9eff;
            margin-bottom: 15px;
            font-size: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .operators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .operator-card {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .operator-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.3);
        }

        .operator-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4a9eff;
            margin-bottom: 8px;
        }

        .operator-name {
            font-size: 12px;
            color: #333333;
            font-weight: 500;
        }

        .operator-tier {
            font-size: 10px;
            color: #ff6b35;
            margin-top: 4px;
        }

        /* 搜索区域 */
        .search-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid rgba(74, 158, 255, 0.3);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .search-clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border: none;
            background: rgba(74, 158, 255, 0.15);
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #4a9eff;
            transition: all 0.2s ease;
        }

        .search-clear-btn:hover {
            background: rgba(74, 158, 255, 0.3);
        }

        .search-clear-btn.show {
            display: flex;
        }

        .search-hint {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            line-height: 1.4;
        }

        .search-results {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .search-result-item:hover {
            background: rgba(74, 158, 255, 0.1);
            transform: translateX(5px);
        }

        .search-result-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4a9eff;
            margin-right: 12px;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .search-result-tag {
            font-size: 12px;
            color: #ff6b35;
        }

        .search-result-match {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* 右侧盟约列表 */
        .right-panel {
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .right-panel h3 {
            color: #4a9eff;
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .covenant-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .covenant-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .covenant-item:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(-5px);
            box-shadow: 0 3px 10px rgba(74, 158, 255, 0.3);
        }

        .covenant-item.active {
            background: rgba(74, 158, 255, 0.3);
            border-color: #4a9eff;
        }

        .covenant-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .covenant-name {
            font-size: 14px;
            color: #333333;
            font-weight: 500;
        }

        /* 干员详情模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 50%, #e9ecef 100%);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .close {
            color: #666666;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .close:hover {
            color: #333333;
        }

        .operator-detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .operator-detail-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a9eff;
            margin-right: 20px;
        }

        .operator-detail-info h2 {
            color: #4a9eff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .operator-detail-tier {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
        }

        .operator-covenants {
            margin: 20px 0;
        }

        .operator-covenants h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .covenant-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .covenant-tag {
            background: rgba(74, 158, 255, 0.15);
            color: #4a9eff;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            border: 1px solid rgba(74, 158, 255, 0.3);
        }

        .operator-trait {
            margin-top: 20px;
        }

        .operator-trait h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .trait-details {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .trait-category {
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .trait-description {
            line-height: 1.6;
            white-space: pre-line;
            color: #555555;
        }

        /* 干员详情悬浮提示框 */
        .operator-tooltip {
            position: absolute;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 50%, #e9ecef 100%);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            min-width: 420px;
            max-width: 550px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: auto;
            transform: scale(0.9);
        }

        .operator-tooltip.show {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .tooltip-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .tooltip-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4a9eff;
            margin-right: 20px;
        }

        .tooltip-info h4 {
            color: #4a9eff;
            font-size: 22px;
            margin: 0 0 8px 0;
        }

        .tooltip-tier {
            color: #ff6b35;
            font-size: 16px;
            font-weight: bold;
        }

        .tooltip-covenants {
            margin: 12px 0;
        }

        .tooltip-covenants h5 {
            color: #4a9eff;
            font-size: 17px;
            margin: 0 0 10px 0;
        }

        .tooltip-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tooltip-tag {
            background: rgba(74, 158, 255, 0.15);
            color: #4a9eff;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 16px;
            border: 1px solid rgba(74, 158, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tooltip-tag:hover {
            background: rgba(74, 158, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(74, 158, 255, 0.2);
        }

        .tooltip-trait {
            margin-top: 12px;
        }

        .tooltip-trait h5 {
            color: #4a9eff;
            font-size: 17px;
            margin: 0 0 10px 0;
        }

        .tooltip-trait-desc {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 16px;
            line-height: 1.6;
            color: #555555;
        }

        .tooltip-trait-category {
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(74, 158, 255, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 158, 255, 0.7);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #888888;
            padding: 40px;
            font-style: italic;
        }

        /* 响应式设计 - 平板 */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }

            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                padding: 10px;
                gap: 15px;
            }

            .left-panel {
                order: 1;
                gap: 15px;
            }

            .right-panel {
                width: 100%;
                order: 2;
                padding: 15px;
            }

            .covenant-info {
                min-height: auto;
                max-height: none;
                padding: 15px;
            }

            .covenant-info h2 {
                font-size: 20px;
            }

            .operators-section {
                padding: 15px;
            }

            .operators-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 10px;
                padding: 5px;
            }

            .operator-avatar {
                width: 50px;
                height: 50px;
            }

            .operator-name {
                font-size: 11px;
            }

            .right-panel h3 {
                font-size: 18px;
                margin-bottom: 15px;
            }

            .covenant-item {
                padding: 10px;
            }

            .covenant-icon {
                width: 35px;
                height: 35px;
            }

            .covenant-name {
                font-size: 13px;
            }

            .search-section {
                margin-bottom: 15px;
                padding-bottom: 10px;
            }

            .search-input {
                padding: 10px 35px 10px 12px;
                font-size: 16px; /* 防止iOS缩放 */
            }

            .search-results {
                max-height: 250px;
            }

            .operator-tooltip {
                min-width: 300px;
                max-width: 90vw;
                padding: 15px;
                font-size: 14px;
            }

            .tooltip-avatar {
                width: 60px;
                height: 60px;
            }

            .tooltip-info h4 {
                font-size: 18px;
            }

            .tooltip-tier {
                font-size: 14px;
            }

            .tooltip-covenants h5,
            .tooltip-trait h5 {
                font-size: 15px;
            }

            .tooltip-tag {
                font-size: 14px;
                padding: 5px 10px;
            }

            .tooltip-trait-desc {
                font-size: 14px;
                padding: 10px;
            }
        }

        /* 响应式设计 - 手机 */
        @media (max-width: 480px) {
            .container {
                padding: 8px;
                gap: 10px;
            }

            .covenant-info h2 {
                font-size: 18px;
            }

            .covenant-details .requirement,
            .covenant-details .description {
                font-size: 14px;
            }

            .operators-section h3,
            .right-panel h3 {
                font-size: 16px;
            }

            .operators-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 8px;
            }

            .operator-card {
                padding: 8px 5px;
            }

            .operator-avatar {
                width: 45px;
                height: 45px;
                margin-bottom: 5px;
            }

            .operator-name {
                font-size: 10px;
            }

            .operator-tier {
                font-size: 9px;
            }

            .covenant-item {
                padding: 8px;
            }

            .covenant-icon {
                width: 30px;
                height: 30px;
                margin-right: 10px;
            }

            .covenant-name {
                font-size: 12px;
            }

            .search-hint {
                font-size: 10px;
            }

            .search-result-item {
                padding: 8px;
            }

            .search-result-avatar {
                width: 35px;
                height: 35px;
                margin-right: 10px;
            }

            .search-result-name {
                font-size: 13px;
            }

            .operator-tooltip {
                min-width: 280px;
                max-width: 95vw;
                padding: 12px;
                border-radius: 10px;
            }

            .tooltip-avatar {
                width: 50px;
                height: 50px;
                margin-right: 12px;
            }

            .tooltip-info h4 {
                font-size: 16px;
            }

            .tooltip-tier {
                font-size: 13px;
            }

            .tooltip-covenants h5,
            .tooltip-trait h5 {
                font-size: 14px;
                margin-bottom: 8px;
            }

            .tooltip-tag {
                font-size: 13px;
                padding: 4px 8px;
                border-radius: 10px;
            }

            .tooltip-trait-desc {
                font-size: 13px;
                padding: 8px;
            }

            .tooltip-trait-category {
                font-size: 13px;
            }
        }

        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .operator-card:hover {
                transform: none;
            }

            .covenant-item:hover {
                transform: none;
            }

            .search-result-item:hover {
                transform: none;
            }

            .tooltip-tag:hover {
                transform: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 盟约信息区域 -->
            <div class="covenant-info" id="covenantInfo">
                <div class="empty-state">请选择一个盟约查看详细信息</div>
            </div>
            
            <!-- 干员列表区域 -->
            <div class="operators-section" id="operatorsSection">
                <h3>干员列表</h3>
                <div class="empty-state">请选择一个盟约查看相关干员</div>
            </div>
        </div>
        
        <!-- 右侧盟约列表 -->
        <div class="right-panel">
            <h3>干员搜索</h3>
            <div class="search-section">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入关键词或使用高级语法">
                    <button class="search-clear-btn" id="searchClearBtn">&times;</button>
                </div>
                <div class="search-hint">支持: and(与) or(或) not(非) 以及括号组合</div>
                <div class="search-results" id="searchResults"></div>
            </div>
            
            <h3>盟约列表</h3>
            <div class="covenant-list" id="covenantList"></div>
        </div>
    </div>
    
    <!-- 干员详情悬浮提示框 -->
    <div id="operatorTooltip" class="operator-tooltip"></div>

    <script>
        // 数据
        let covenantData = {};
        let operatorData = {};
        let currentCovenant = null;

        // 加载数据
        async function loadData() {
            try {
                const [covenantResponse, operatorResponse] = await Promise.all([
                    fetch('data_盟约.json'),
                    fetch('data_干员.json')
                ]);
                
                covenantData = await covenantResponse.json();
                operatorData = await operatorResponse.json();
                
                renderCovenantList();
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 渲染盟约列表
        function renderCovenantList() {
            const covenantList = document.getElementById('covenantList');
            covenantList.innerHTML = '';
            
            Object.keys(covenantData).forEach(covenantName => {
                const covenantItem = document.createElement('div');
                covenantItem.className = 'covenant-item';
                covenantItem.dataset.covenant = covenantName;
                
                const covenantIcon = document.createElement('img');
                covenantIcon.className = 'covenant-icon';
                covenantIcon.src = `images/盟约/${covenantName}.png`;
                covenantIcon.alt = covenantName;
                covenantIcon.onerror = function() {
                    this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjQwIiByeD0iOCIgZmlsbD0iIzJhNGE2ZSIvPgo8dGV4dCB4PSIyMCIgeT0iMjUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIiBmb250LXNpemU9IjEyIj4/PC90ZXh0Pgo8L3N2Zz4K';
                };
                
                const covenantNameEl = document.createElement('div');
                covenantNameEl.className = 'covenant-name';
                covenantNameEl.textContent = covenantName;
                
                covenantItem.appendChild(covenantIcon);
                covenantItem.appendChild(covenantNameEl);
                
                covenantItem.addEventListener('click', () => selectCovenant(covenantName));
                
                covenantList.appendChild(covenantItem);
            });
        }

        // 选择盟约
        function selectCovenant(covenantName) {
            currentCovenant = covenantName;
            
            // 更新选中状态
            document.querySelectorAll('.covenant-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-covenant="${covenantName}"]`).classList.add('active');
            
            // 显示盟约信息
            showCovenantInfo(covenantName);
            
            // 显示相关干员
            showOperators(covenantName);
        }

        // 显示盟约信息
        function showCovenantInfo(covenantName) {
            const covenantInfo = document.getElementById('covenantInfo');
            const covenant = covenantData[covenantName];
            
            if (!covenant) {
                covenantInfo.innerHTML = '<div class="empty-state">盟约信息不存在</div>';
                return;
            }
            
            covenantInfo.innerHTML = `
                <h2>${covenantName}</h2>
                <div class="covenant-details">
                    <div class="requirement">激活需要人数: ${covenant['激活需要人数'] || '无'}</div>
                    <div class="description">${covenant['描述']}</div>
                </div>
            `;
        }

        // 显示相关干员
        function showOperators(covenantName) {
            const operatorsSection = document.getElementById('operatorsSection');
            const operators = [];
            
            // 找到属于该盟约的所有干员
            Object.keys(operatorData).forEach(operatorName => {
                const operator = operatorData[operatorName];
                if (operator['盟约'] && operator['盟约'].includes(covenantName)) {
                    operators.push({
                        name: operatorName,
                        tier: operator['阶位'],
                        covenants: operator['盟约'],
                        trait: operator['特质']
                    });
                }
            });
            
            if (operators.length === 0) {
                operatorsSection.innerHTML = `
                    <h3>干员列表</h3>
                    <div class="empty-state">没有找到属于该盟约的干员</div>
                `;
                return;
            }
            
            // 按阶位排序
            operators.sort((a, b) => {
                const tierOrder = {'6阶': 6, '5阶': 5, '4阶': 4, '3阶': 3, '2阶': 2, '1阶': 1};
                return (tierOrder[b.tier] || 0) - (tierOrder[a.tier] || 0);
            });
            
            const operatorsGrid = document.createElement('div');
            operatorsGrid.className = 'operators-grid';
            
            operators.forEach(operator => {
                const operatorCard = document.createElement('div');
                operatorCard.className = 'operator-card';
                
                const avatar = document.createElement('img');
                avatar.className = 'operator-avatar';
                avatar.src = `images/干员/${operator.name}.png`;
                avatar.alt = operator.name;
                avatar.onerror = function() {
                    this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMzAiIGN5PSIzMCIgcj0iMzAiIGZpbGw9IiM0YTRhZmYiLz4KPHRleHQgeD0iMzAiIHk9IjM1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSIxMiI+PjwvdGV4dD4KPC9zdmc+';
                };
                
                const name = document.createElement('div');
                name.className = 'operator-name';
                name.textContent = operator.name;
                
                const tier = document.createElement('div');
                tier.className = 'operator-tier';
                tier.textContent = operator.tier;
                
                operatorCard.appendChild(avatar);
                operatorCard.appendChild(name);
                operatorCard.appendChild(tier);
                
                operatorCard.addEventListener('click', () => showOperatorDetail(operator, event));
                operatorCard.addEventListener('mouseenter', () => showOperatorDetail(operator, event));
                operatorCard.addEventListener('mouseleave', () => hideOperatorDetail());
                
                operatorsGrid.appendChild(operatorCard);
            });
            
            operatorsSection.innerHTML = '<h3>干员列表</h3>';
            operatorsSection.appendChild(operatorsGrid);
        }

        let tooltipTimeout = null;
        let currentTooltipOperator = null;
        let isMouseOverTooltip = false;

        // 显示干员详情
        function showOperatorDetail(operator, event) {
            currentTooltipOperator = operator;
            isMouseOverTooltip = false;
            
            // 清除之前的隐藏定时器
            if (tooltipTimeout) {
                clearTimeout(tooltipTimeout);
                tooltipTimeout = null;
            }
            
            const tooltip = document.getElementById('operatorTooltip');
            
            const covenantsHtml = operator.covenants.map(covenant => 
                `<span class="tooltip-tag" data-covenant="${covenant}">${covenant}</span>`
            ).join('');
            
            tooltip.innerHTML = `
                <div class="tooltip-header">
                    <img class="tooltip-avatar" src="images/干员/${operator.name}.png" alt="${operator.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHZpZXdCb3g9IjAgMCA1MCA1MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjUiIGN5PSIyNSIgcj0iMjUiIGZpbGw9IiM0YTRhZmYiLz4KPHRleHQgeD0iMjUiIHk9IjMwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSIxMiI+PjwvdGV4dD4KPC9zdmc+Cg==';">
                    <div class="tooltip-info">
                        <h4>${operator.name}</h4>
                        <div class="tooltip-tier">${operator.tier}</div>
                    </div>
                </div>
                
                <div class="tooltip-covenants">
                    <h5>所属盟约</h5>
                    <div class="tooltip-tags">
                        ${covenantsHtml}
                    </div>
                </div>
                
                <div class="tooltip-trait">
                    <h5>特质</h5>
                    <div class="tooltip-trait-desc">
                        <div class="tooltip-trait-category"> ${operator.trait['分类']}</div>
                        <div>${operator.trait['描述']}</div>
                    </div>
                </div>
            `;
            
            // 计算位置
            const rect = event.target.getBoundingClientRect();
            
            // 临时显示以获取尺寸
            tooltip.classList.add('show');
            const tooltipRect = tooltip.getBoundingClientRect();
            tooltip.classList.remove('show');
            
            let left = rect.left + rect.width / 2 - tooltipRect.width / 2;
            let top = rect.top - tooltipRect.height - 10;
            
            // 确保不超出视窗边界
            if (left < 10) left = 10;
            if (left + tooltipRect.width > window.innerWidth - 10) {
                left = window.innerWidth - tooltipRect.width - 10;
            }
            if (top < 10) {
                top = rect.bottom + 10;
            }
            
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            
            // 显示动画
            requestAnimationFrame(() => {
                tooltip.classList.add('show');
            });
            
            // 添加盟约标签点击事件
            setTimeout(() => {
                const covenantTags = tooltip.querySelectorAll('.tooltip-tag');
                covenantTags.forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const covenantName = tag.dataset.covenant;
                        selectCovenant(covenantName);
                        hideOperatorDetail();
                    });
                });
            }, 50);
        }

        // 隐藏干员详情
        function hideOperatorDetail() {
            if (isMouseOverTooltip) {
                return;
            }
            
            tooltipTimeout = setTimeout(() => {
                if (!isMouseOverTooltip) {
                    const tooltip = document.getElementById('operatorTooltip');
                    tooltip.classList.remove('show');
                    currentTooltipOperator = null;
                }
                tooltipTimeout = null;
            }, 100);
        }

        // 给悬浮框添加鼠标事件
        document.addEventListener('DOMContentLoaded', () => {
            const tooltip = document.getElementById('operatorTooltip');
            
            tooltip.addEventListener('mouseenter', () => {
                isMouseOverTooltip = true;
                if (tooltipTimeout) {
                    clearTimeout(tooltipTimeout);
                    tooltipTimeout = null;
                }
            });
            
            tooltip.addEventListener('mouseleave', () => {
                isMouseOverTooltip = false;
                hideOperatorDetail();
            });
        });

        // 设置搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const searchClearBtn = document.getElementById('searchClearBtn');

            let searchTimeout = null;

            // 输入事件
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.trim();

                // 显示/隐藏清除按钮
                if (keyword) {
                    searchClearBtn.classList.add('show');
                } else {
                    searchClearBtn.classList.remove('show');
                }

                // 清除之前的搜索定时器
                if (searchTimeout) {
                    clearTimeout(searchTimeout);
                }

                // 空关键词时清空结果
                if (!keyword) {
                    searchResults.innerHTML = '';
                    return;
                }

                // 延迟搜索，避免频繁搜索
                searchTimeout = setTimeout(() => {
                    performAdvancedSearch(keyword);
                }, 300);
            });

            // 清除按钮点击事件
            searchClearBtn.addEventListener('click', () => {
                clearSearch();
            });
        }

        // 高级搜索 - 支持布尔逻辑
        function performAdvancedSearch(query) {
            const results = [];

            // 解析查询表达式
            const matchOperator = (operatorName, operator) => {
                const traitCategory = operator['特质']?.['分类'] || '';
                const traitTags = operator['特质']?.['tag']?.join(' ') || '';
                const covenants = operator['盟约']?.join(' ') || '';
                const text = (operatorName + ' ' + traitCategory + ' ' + traitTags + ' ' + covenants).toLowerCase();
                return text;
            };

            // 布尔表达式解析器
            const evaluateExpression = (operatorName, operator, expr) => {
                const text = matchOperator(operatorName, operator);
                return evaluateBoolExpr(text, expr.toLowerCase());
            };

            // 递归解析布尔表达式
            function evaluateBoolExpr(text, expr) {
                expr = expr.trim();
                
                // 处理括号
                while (expr.includes('(')) {
                    const start = expr.lastIndexOf('(');
                    const end = expr.indexOf(')', start);
                    if (end === -1) break;
                    
                    const subExpr = expr.substring(start + 1, end);
                    const result = evaluateBoolExpr(text, subExpr);
                    expr = expr.substring(0, start) + (result ? ' true ' : ' false ') + expr.substring(end + 1);
                }

                // 按 or 分割
                const orParts = expr.split(/\s+or\s+/);
                for (let part of orParts) {
                    if (evaluateAndExpr(text, part.trim())) {
                        return true;
                    }
                }
                return false;
            }

            // 处理 and 表达式
            function evaluateAndExpr(text, expr) {
                const andParts = expr.split(/\s+and\s+/);
                for (let part of andParts) {
                    part = part.trim();
                    if (part === 'true') continue;
                    if (part === 'false') return false;
                    
                    // 处理 not
                    if (part.startsWith('not ')) {
                        const term = part.substring(4).trim();
                        if (text.includes(term)) return false;
                    } else {
                        if (!text.includes(part)) return false;
                    }
                }
                return true;
            }

            // 遍历所有干员
            Object.keys(operatorData).forEach(operatorName => {
                const operator = operatorData[operatorName];
                
                if (evaluateExpression(operatorName, operator, query)) {
                    const traitCategory = operator['特质']?.['分类'] || '';
                    const text = (operatorName + ' ' + traitCategory).toLowerCase();
                    
                    // 判断匹配类型
                    const nameMatch = operatorName.toLowerCase().includes(query.toLowerCase().replace(/\s+(and|or|not)\s+/g, ' ').trim());
                    
                    results.push({
                        name: operatorName,
                        tier: operator['阶位'],
                        covenants: operator['盟约'],
                        trait: operator['特质'],
                        matchType: nameMatch ? 'name' : 'tag'
                    });
                }
            });

            // 按阶位排序
            results.sort((a, b) => {
                const tierOrder = {'6阶': 6, '5阶': 5, '4阶': 4, '3阶': 3, '2阶': 2, '1阶': 1};
                return (tierOrder[b.tier] || 0) - (tierOrder[a.tier] || 0);
            });

            // 显示搜索结果
            renderSearchResults(results, query);
        }

        // 渲染搜索结果
        function renderSearchResults(results, keyword) {
            const searchResults = document.getElementById('searchResults');

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="empty-state" style="padding: 20px; font-size: 14px;">未找到匹配结果</div>';
                return;
            }

            let html = '';

            results.forEach(operator => {
                const matchText = operator.matchType === 'name'
                    ? `名称匹配`
                    : `特质: ${operator.trait['分类']}`;

                html += `
                    <div class="search-result-item" data-operator="${operator.name}">
                        <img class="search-result-avatar" src="images/干员/${operator.name}.png" alt="${operator.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMjAiIGZpbGw9IiM0YTRhZmYiLz4KPHRleHQgeD0iMjAiIHk9IjI1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSIxMCI+Py8vdGV4dD4KPC9zdmc+';" />
                        <div class="search-result-info">
                            <div class="search-result-name">${operator.name}</div>
                            <div class="search-result-tag">${operator.tier}</div>
                            <div class="search-result-match">${matchText}</div>
                        </div>
                    </div>
                `;
            });

            searchResults.innerHTML = html;

            // 绑定点击事件
            searchResults.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const operatorName = item.dataset.operator;
                    const operator = operatorData[operatorName];
                    const operatorObj = {
                        name: operatorName,
                        tier: operator['阶位'],
                        covenants: operator['盟约'],
                        trait: operator['特质']
                    };
                    // 点击后选中该干员的第一个盟约
                    if (operatorObj.covenants && operatorObj.covenants.length > 0) {
                        selectCovenant(operatorObj.covenants[0]);
                    }
                });
            });
        }

        // 清除搜索
        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const searchClearBtn = document.getElementById('searchClearBtn');
            searchInput.value = '';
            searchResults.innerHTML = '';
            searchClearBtn.classList.remove('show');
        }

        // 初始化
        loadData();

        // 设置搜索功能
        setupSearch();
    </script>
